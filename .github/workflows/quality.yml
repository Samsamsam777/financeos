name: Quality

on:
  push:
    branches:
      - main
      - "sprint/**"
  pull_request:

permissions:
  contents: read

jobs:
  quality:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24.x

      - name: Install
        run: npm ci

      - name: Build and check
        run: npm run build
