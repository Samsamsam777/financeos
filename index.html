<!doctype html><html lang="de"><head><meta charset="utf-8"><meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover"><meta name="theme-color" content="#0b1020"><title>FinanceOS</title><style>
:root{--bg:#0b1020;--p:#151c30;--p2:#1b2540;--t:#f7f8fc;--m:#9aa4b2;--a:#7867f8;--b:#2a3553;--d:#ff7373;--g:#55d98d}*{box-sizing:border-box}body{margin:0;background:var(--bg);color:var(--t);font-family:system-ui,-apple-system,Segoe UI,sans-serif}.app{max-width:800px;margin:auto;padding:16px 14px 100px}.top{display:flex;justify-content:space-between;align-items:center}.top h1{margin:0;font-size:1.35rem}.top p{margin:3px 0;color:var(--m);font-size:.8rem}.card{background:linear-gradient(180deg,var(--p),#101729);border:1px solid var(--b);border-radius:20px;padding:15px;margin:12px 0}.grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}.k small{color:var(--m)}.k strong{display:block;font-size:1.35rem;margin-top:6px}.row{display:flex;justify-content:space-between;gap:12px;align-items:center;padding:12px 0;border-bottom:1px solid var(--b)}.row:last-child{border:0}.meta{font-size:.78rem;color:var(--m)}.neg{color:#ff9696}.pos{color:#73e8a7}.btn{border:0;border-radius:13px;padding:11px 13px;background:var(--p2);color:var(--t);font-weight:700}.primary{background:linear-gradient(135deg,var(--a),#4f91ff)}.field{margin:11px 0}.field label{display:block;color:var(--m);font-size:.78rem;margin-bottom:5px}.field input,.field select{width:100%;padding:12px;border-radius:12px;border:1px solid var(--b);background:#0f1628;color:var(--t)}.nav{position:fixed;bottom:0;left:0;right:0;background:#0b1020ee;border-top:1px solid var(--b);display:grid;grid-template-columns:repeat(5,1fr);padding:8px 6px calc(8px + env(safe-area-inset-bottom))}.nav button{border:0;background:none;color:var(--m);font-size:.7rem}.nav button.active{color:white}.plus{width:48px;height:48px;border-radius:50%;background:var(--a)!important;color:white!important;font-size:1.4rem!important;margin:-15px auto 0}.progress{height:9px;background:#27314a;border-radius:99px;overflow:hidden}.progress span{display:block;height:100%;background:linear-gradient(90deg,var(--a),#2dd4bf)}.section{display:flex;justify-content:space-between;align-items:center;margin:22px 2px 8px}.section h2{font-size:1rem;margin:0}.badge{background:#46391d;color:#ffdc7a;border-radius:99px;padding:5px 9px;font-size:.72rem;font-weight:800}.empty{text-align:center;color:var(--m);padding:22px}.search{width:100%;padding:12px;border-radius:12px;border:1px solid var(--b);background:#0f1628;color:var(--t)}
</style></head><body><div id="app"></div><script>
const K='financeos-v01';const seed={people:['Gemeinsam','Sam','Partnerin','Unklar'],accounts:[{id:'a1',name:'Gemeinschaftskonto',start:2500},{id:'a2',name:'Kreditkarte',start:0},{id:'a3',name:'Bargeld',start:100}],cats:[{id:'c1',name:'Lebensmittel',budget:450},{id:'c2',name:'Wohnen',budget:1200},{id:'c3',name:'Restaurants',budget:180},{id:'c4',name:'Mobilität',budget:220},{id:'c5',name:'Shopping',budget:200},{id:'c6',name:'Abonnements',budget:80},{id:'c7',name:'Gehalt',budget:0},{id:'c8',name:'Später zuordnen',budget:0}],rules:[['REWE','c1'],['EDEKA','c1'],['LIDL','c1'],['ALDI','c1'],['AMAZON','c5'],['SPOTIFY','c6'],['NETFLIX','c6'],['SHELL','c4'],['GEHALT','c7']],tx:[],loans:[{name:'Autokredit',principal:25000,remaining:14382,rate:420,interest:4.2}]};
const uid=()=>crypto.randomUUID?crypto.randomUUID():Date.now()+Math.random();const day=()=>new Date().toISOString().slice(0,10);function init(){let d=JSON.parse(JSON.stringify(seed));d.tx=[{id:uid(),date:day(),type:'income',amount:3200,description:'Gehalt',accountId:'a1',categoryId:'c7',person:'Gemeinsam',status:'done'},{id:uid(),date:day(),type:'expense',amount:74.6,description:'REWE Markt',accountId:'a1',categoryId:'c1',person:'Gemeinsam',status:'done'},{id:uid(),date:day(),type:'expense',amount:47.9,description:'PAYPAL *M32H8KD',accountId:'a1',categoryId:'c8',person:'Unklar',status:'pending'}];localStorage.setItem(K,JSON.stringify(d));return d}let d;try{d=JSON.parse(localStorage.getItem(K))||init()}catch{d=init()}let view='today',q='';const app=document.getElementById('app');const euro=n=>new Intl.NumberFormat('de-DE',{style:'currency',currency:'EUR'}).format(Number(n||0));const cat=id=>d.cats.find(x=>x.id===id);const acc=id=>d.accounts.find(x=>x.id===id);const save=()=>localStorage.setItem(K,JSON.stringify(d));
function detect(s){s=s.toUpperCase();const r=d.rules.find(x=>s.includes(x[0]));return r?r[1]:'c8'}function bal(id){let a=acc(id),s=+a.start;d.tx.filter(t=>t.accountId===id).forEach(t=>s+=t.type==='income'?+t.amount:-t.amount);return s}function sum(){let m=day().slice(0,7),x=d.tx.filter(t=>t.date.slice(0,7)===m),i=x.filter(t=>t.type==='income').reduce((a,b)=>a + Number(b.amount),0),e=x.filter(t=>t.type==='expense').reduce((a,b)=>a + Number(b.amount),0);return{i,e,v:i-e,r:i?(i-e)/i:0}}function nav(id,l,ic){return `<button data-nav="${id}" class="${view===id?'active':''}"><div>${ic}</div>${l}</button>`}function shell(c){app.innerHTML=`<main class="app"><div class="top"><div><h1>FinanceOS</h1><p>Privat. Offline. Dein Haushalt.</p></div><button class="btn" data-nav="settings">⚙</button></div>${c}</main><nav class="nav">${nav('today','Heute','⌂')}${nav('transactions','Buchungen','≡')}<button class="plus" data-nav="add">＋</button>${nav('budgets','Budgets','◔')}${nav('more','Mehr','•••')}</nav>`;bind()}function bind(){document.querySelectorAll('[data-nav]').forEach(b=>b.onclick=()=>{view=b.dataset.nav;render()})}function txrow(t,edit=false){return `<div class="row"><div><strong>${t.description}</strong><div class="meta">${cat(t.categoryId)?.name||'—'} · ${acc(t.accountId)?.name||'—'} · ${t.person}</div></div><div style="text-align:right"><div class="${t.type==='income'?'pos':'neg'}">${t.type==='income'?'+':'-'}${euro(t.amount)}</div>${edit?`<button class="btn" data-edit="${t.id}" style="margin-top:6px;padding:6px 9px">Bearbeiten</button>`:''}</div></div>`}
function todayView(){let s=sum(),p=d.tx.filter(t=>t.status==='pending'),recent=[...d.tx].sort((a,b)=>b.date.localeCompare(a.date)).slice(0,5),l=d.loans[0],paid=l.principal-l.remaining,pct=paid/l.principal*100;shell(`<div class="grid"><div class="card k"><small>Verfügbar</small><strong>${euro(s.v)}</strong></div><div class="card k"><small>Ausgaben</small><strong>${euro(s.e)}</strong></div><div class="card k"><small>Einnahmen</small><strong>${euro(s.i)}</strong></div><div class="card k"><small>Sparquote</small><strong>${Math.round(s.r*100)} %</strong></div></div><div class="section"><h2>Heute</h2></div><div class="card"><div class="row"><div><strong>Offene Zuordnungen</strong><div class="meta">Unklare Händler später prüfen</div></div><button class="btn primary" data-nav="pending">${p.length}</button></div><div class="row"><div style="flex:1"><strong>${l.name}</strong><div class="meta">${euro(paid)} von ${euro(l.principal)} abbezahlt</div><div class="progress" style="margin-top:8px"><span style="width:${pct}%"></span></div></div><div>${Math.round(pct)} %</div></div></div><div class="section"><h2>Konten</h2></div><div class="card">${d.accounts.map(a=>`<div class="row"><div><strong>${a.name}</strong></div><strong>${euro(bal(a.id))}</strong></div>`).join('')}</div><div class="section"><h2>Letzte Buchungen</h2></div><div class="card">${recent.map(t=>txrow(t)).join('')}</div>`)}
function transView(){let x=[...d.tx].sort((a,b)=>b.date.localeCompare(a.date));if(q){let z=q.toLowerCase();x=x.filter(t=>t.description.toLowerCase().includes(z)||String(t.amount).includes(z)||(cat(t.categoryId)?.name||'').toLowerCase().includes(z))}shell(`<div class="section"><h2>Buchungen</h2><button class="btn primary" data-nav="add">＋ Neu</button></div><input class="search" id="search" value="${q}" placeholder="Händler, Kategorie oder Betrag"><div class="card">${x.map(t=>txrow(t,true)).join('')||'<div class="empty">Keine Treffer</div>'}</div>`);document.getElementById('search').oninput=e=>{q=e.target.value;transView()};document.querySelectorAll('[data-edit]').forEach(b=>b.onclick=()=>editTx(b.dataset.edit))}
function field(l,c){return `<div class="field"><label>${l}</label>${c}</div>`}function addView(){shell(`<div class="section"><h2>Neue Buchung</h2></div><div class="card"><form id="f">${field('Datum',`<input name="date" type="date" value="${day()}" required>`)}${field('Typ','<select name="type"><option value="expense">Ausgabe</option><option value="income">Einnahme</option></select>')}${field('Betrag','<input name="amount" type="number" step="0.01" inputmode="decimal" required>')}${field('Beschreibung','<input name="description" placeholder="z. B. REWE Markt" required>')}${field('Konto',`<select name="accountId">${d.accounts.map(a=>`<option value="${a.id}">${a.name}</option>`).join('')}</select>`)}${field('Kategorie',`<select name="categoryId"><option value="">Automatisch erkennen</option>${d.cats.map(c=>`<option value="${c.id}">${c.name}</option>`).join('')}</select>`)}${field('Person (optional)',`<select name="person">${d.people.map(p=>`<option>${p}</option>`).join('')}</select>`)}<button class="btn primary">Buchung speichern</button></form></div>`);document.getElementById('f').onsubmit=e=>{e.preventDefault();let f=new FormData(e.target),desc=f.get('description'),cid=f.get('categoryId')||detect(desc);d.tx.push({id:uid(),date:f.get('date'),type:f.get('type'),amount:+f.get('amount'),description:desc,accountId:f.get('accountId'),categoryId:cid,person:f.get('person'),status:cid==='c8'?'pending':'done'});save();view='today';render()}}
function pendingView(){let x=d.tx.filter(t=>t.status==='pending');shell(`<div class="section"><h2>Später zuordnen</h2><span class="badge">${x.length} offen</span></div><div class="card">${x.map(t=>`<div class="row"><div><strong>${t.description}</strong><div class="meta">${euro(t.amount)} · ${t.person}</div></div><button class="btn" data-r="${t.id}">Zuordnen</button></div>`).join('')||'<div class="empty">Alles erledigt</div>'}</div>`);document.querySelectorAll('[data-r]').forEach(b=>b.onclick=()=>resolve(b.dataset.r))}
function budgetsView(){let m=day().slice(0,7),x=d.tx.filter(t=>t.type==='expense'&&t.date.slice(0,7)===m);shell(`<div class="section"><h2>Budgets</h2></div><div class="card">${d.cats.filter(c=>c.budget>0).map(c=>{let u=x.filter(t=>t.categoryId===c.id).reduce((a,b)=>a + Number(b.amount),0),p=Math.min(100,u/c.budget*100);return `<div class="row"><div style="flex:1"><strong>${c.name}</strong><div class="meta">${euro(u)} von ${euro(c.budget)}</div><div class="progress" style="margin-top:8px"><span style="width:${p}%"></span></div></div><div>${Math.round(p)} %</div></div>`}).join('')}</div>`)}
function moreView(){shell(`<div class="section"><h2>Mehr</h2></div><button class="card btn" data-nav="pending" style="width:100%">Später zuordnen</button><button class="card btn" data-nav="settings" style="width:100%">Einstellungen & Backup</button>`)}function settingsView(){shell(`<div class="section"><h2>Einstellungen & Daten</h2></div><div class="card"><button class="btn primary" id="backup" style="width:100%">Backup erstellen</button><label class="btn" style="display:block;text-align:center;margin-top:10px">Backup wiederherstellen<input id="restore" type="file" accept="application/json" hidden></label><button class="btn" id="rule" style="width:100%;margin-top:10px">Händlerregel hinzufügen</button><button class="btn" id="cat" style="width:100%;margin-top:10px">Kategorie hinzufügen</button><button class="btn" id="account" style="width:100%;margin-top:10px">Konto hinzufügen</button><button class="btn" id="reset" style="width:100%;margin-top:10px;color:var(--d)">Zurücksetzen</button><p class="meta">Beim Backup auf dem iPhone „In Dateien sichern“ und anschließend iCloud Drive wählen.</p></div>`);document.getElementById('backup').onclick=backup;document.getElementById('restore').onchange=restore;document.getElementById('reset').onclick=()=>{if(confirm('Alles zurücksetzen?')){localStorage.removeItem(K);location.reload()}};document.getElementById('rule').onclick=()=>{let n=prompt('Suchbegriff');if(!n)return;let id=prompt(d.cats.map(c=>c.id+' = '+c.name).join('\n')+'\n\nKategorie-ID');if(cat(id)){d.rules.push([n.toUpperCase(),id]);save();alert('Gespeichert')}};document.getElementById('cat').onclick=()=>{let n=prompt('Kategoriename');if(!n)return;let b=+(prompt('Monatsbudget','0')||0);d.cats.push({id:uid(),name:n,budget:b});save();alert('Gespeichert')};document.getElementById('account').onclick=()=>{let n=prompt('Kontoname');if(!n)return;let s=+(prompt('Startsaldo','0')||0);d.accounts.push({id:uid(),name:n,start:s});save();alert('Gespeichert')}}
function editTx(id){let t=d.tx.find(x=>x.id===id),desc=prompt('Beschreibung',t.description);if(desc===null)return;let amount=prompt('Betrag',t.amount);if(amount===null)return;t.description=desc;t.amount=+amount;save();transView()}function resolve(id){let t=d.tx.find(x=>x.id===id),cid=prompt(d.cats.filter(c=>c.id!=='c8').map(c=>c.id+' = '+c.name).join('\n')+'\n\nKategorie-ID');if(!cat(cid))return;t.categoryId=cid;t.status='done';if(confirm('Diesen Händler künftig automatisch erkennen?'))d.rules.push([t.description.toUpperCase(),cid]);save();pendingView()}function backup(){let a=document.createElement('a'),blob=new Blob([JSON.stringify(d,null,2)],{type:'application/json'});a.href=URL.createObjectURL(blob);a.download='financeos-backup-'+day()+'.json';a.click()}async function restore(e){try{let o=JSON.parse(await e.target.files[0].text());if(!o.accounts||!o.tx)throw Error('Ungültig');d=o;save();view='today';render()}catch(x){alert(x.message)}}function render(){if(view==='today')todayView();else if(view==='transactions')transView();else if(view==='add')addView();else if(view==='pending')pendingView();else if(view==='budgets')budgetsView();else if(view==='settings')settingsView();else moreView();bind()}render();
</script></body></html>
